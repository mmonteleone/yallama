name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  standalone:
    name: Build Standalone Asset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build standalone script
        shell: bash
        run: bash tools/build-standalone.sh

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/yallama