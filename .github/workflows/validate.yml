name: Validate

on:
  push:
  pull_request:
  workflow_call:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi
      - name: Lint script
        run: shellcheck src/corral.sh tools/build.sh src/lib/*.sh tests/smoke.sh tests/unit.sh tests/test-helpers.sh

  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Ensure jq is available
        shell: bash
        run: |
          if command -v jq >/dev/null 2>&1; then
            exit 0
          fi

          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y jq
          else
            brew install jq
          fi
      - name: Run smoke tests
        shell: bash
        run: bash tests/smoke.sh

  unit:
    name: Unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests
        shell: bash
        run: bash tests/unit.sh
